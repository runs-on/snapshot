name: Test
on:
  push:
    branches:
      - master
      - main
      - v*
      - feature/v*
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  build-with-snapshot:
    name: Build with Snapshot
    runs-on: runs-on=${{ github.run_id }}/image=ubuntu24-full-x64/family=c7a.2xlarge
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: /var/lib/docker
          volume_size: 60
      - run: df -ah && sudo ls -al /var/lib/docker
      - uses: docker/setup-buildx-action@v3
        with:
          name: runs-on
          keep-state: true
      - uses: actions/checkout@v4
        with:
          repository: runs-on-demo/benchmark-posthog
          submodules: recursive
          path: repo
      - name: Determine upstream commit SHA
        id: upstream
        run: echo "sha=$(cd repo/upstream && git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v4
        with:
          context: https://github.com/PostHog/posthog.git#${{ steps.upstream.outputs.sha }}
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1

  restore-only:
    name: "save: false"
    runs-on: runs-on=${{ github.run_id }}/image=ubuntu24-full-x64/family=c7a.2xlarge
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: /path/to/volume
          volume_size: 10
          save: false
      - run: |
          sudo chown -R runner:runner /path/to/volume
          dd if=/dev/zero of=/path/to/volume/test-file-1gb bs=1M count=1024
          ls -lh /path/to/volume/

  test-windows:
    name: Test Windows
    runs-on: runs-on=${{ github.run_id }}/image=windows22-full-x64/family=m7a.large
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: C:\test-volume
          volume_size: 10
          save: true
      - run: dir C:\test-volume
